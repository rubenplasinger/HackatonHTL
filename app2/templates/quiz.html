{% extends "template.html" %}
{% block title %}Quiz – Frage {{ q_id }}{% endblock %}
{% block content %}
<div class="quiz-container">
        <div class="quiz-header">
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{ (q_id / total * 100) | int }}%"></div>
            </div>
            <span class="progress-text">▶ FRAGE {{ q_id }} / {{ total }}</span>
        </div>

        <div class="question-card">
            <h2 class="question-text">{{ question.question }}</h2>

            <form method="POST" action="/quiz/question/{{ q_id }}">
                <div class="options-list">
                    {% for option in question.options %}
                    <label class="option-label">
                        <input type="radio" name="answer" value="{{ option }}" required>
                        <span class="option-text">{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    {% if q_id == total %}✔ AUSWERTEN{% else %}WEITER ▶{% endif %}
                </button>
            </form>
        </div>
</div>
{% endblock %}
