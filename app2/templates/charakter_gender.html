{% extends "template.html" %}
{% block title %}Charakter – Geschlecht wählen{% endblock %}
{% block content %}
<div class="char-container">
    <h1 class="char-title">CHARAKTER<br>ERSTELLEN</h1>
    <p class="char-subtitle">Wähle dein Geschlecht</p>

    <form method="POST" action="/charakter">
        <div class="gender-grid">
            <button type="submit" name="geschlecht" value="m" class="gender-btn">
                <span class="gender-icon">🧍‍♂️</span>
                <span class="gender-label">MÄNNLICH</span>
            </button>
            <button type="submit" name="geschlecht" value="w" class="gender-btn">
                <span class="gender-icon">🧍‍♀️</span>
                <span class="gender-label">WEIBLICH</span>
            </button>
        </div>
    </form>

    <a href="/" class="btn btn-secondary btn-full" style="margin-top:1rem">⌂ ZURÜCK</a>
</div>
{% endblock %}
